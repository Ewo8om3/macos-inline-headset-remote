name: Bug report
description: Report a reproducible CLI, preset, or configuration problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach your complete Karabiner configuration, backups, transcripts, credentials, or account data.
  - type: input
    id: version
    attributes:
      label: Toolkit version
      placeholder: v1.0.0 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS version, Karabiner version, Mac model
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the command, sanitized output, expected behavior, and actual behavior.
    validations:
      required: true
  - type: textarea
    id: detection
    attributes:
      label: Sanitized detection evidence
      description: Paste only the relevant device entry from `bin/headset-remote detect --json`.
      render: json
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed personal configuration, secrets, transcripts, and account data.
          required: true
        - label: I reproduced this with the latest release.
          required: true
